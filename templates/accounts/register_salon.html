{% extends "layout/base_login_auth.html" %}

{% block title %}Créer Votre Salon - Salon de Coiffure Pro{% endblock %}

{% block content %}
<div>
    <h2 class="auth-title">Créer votre salon</h2>
    <p class="auth-subtitle">Ouvrez votre compte propriétaire et configurez votre salon en quelques minutes.</p>

    <form id="registerSalonForm" class="d-grid gap-2">

        <!-- PARTIE 1 : Infos utilisateur -->
        <div id="userInfoSection">
            <div class="row g-2">
                <div class="col-md-6">
                    <label class="form-label mb-1">Prénom</label>
                    <input type="text" class="form-control" id="first_name" placeholder="Prénom" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label mb-1">Nom</label>
                    <input type="text" class="form-control" id="last_name" placeholder="Nom" required>
                </div>
            </div>

            <div>
                <label class="form-label mb-1">Nom d'utilisateur</label>
                <input type="text" class="form-control" id="username" placeholder="Nom d'utilisateur" required>
            </div>

            <div>
                <label class="form-label mb-1">Email</label>
                <input type="email" class="form-control" id="email" placeholder="Email" required>
            </div>

            <div class="row g-2">
                <div class="col-md-6">
                    <label class="form-label mb-1">Mot de passe</label>
                    <input type="password" class="form-control" id="password" placeholder="Mot de passe" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label mb-1">Confirmer</label>
                    <input type="password" class="form-control" id="password_confirm" placeholder="Confirmer" required>
                </div>
            </div>

            <button type="button" class="btn btn-primary mt-2" id="nextBtn">Suivant</button>
        </div>

        <!-- PARTIE 2 : Infos salon -->
        <div id="salonInfoSection" style="display:none;">
            <hr class="my-2">
            <div>
                <label class="form-label mb-1">Nom du salon</label>
                <input type="text" class="form-control" id="salon_nom" placeholder="Nom du salon" required>
            </div>

            <div>
                <label class="form-label mb-1">Adresse</label>
                <input type="text" class="form-control" id="salon_adresse" placeholder="Adresse du salon">
            </div>

            <div class="row g-2">
                <div class="col-md-6">
                    <label class="form-label mb-1">Téléphone</label>
                    <input type="text" class="form-control" id="salon_telephone" placeholder="Téléphone du salon">
                </div>
                <div class="col-md-6">
                    <label class="form-label mb-1">Email salon</label>
                    <input type="email" class="form-control" id="salon_email" placeholder="Email du salon">
                </div>
            </div>

            <div>
                <label class="form-label mb-1">Lien localisation</label>
                <input type="url" class="form-control" id="salon_localisation" placeholder="Lien Google Maps">
            </div>

            <div>
                <label class="form-label mb-1">Nombre de postes</label>
                <input type="number" min="1" class="form-control" id="max_postes" value="1">
            </div>

            <button type="submit" class="btn btn-primary mt-2">Créer mon salon</button>
        </div>
    </form>

    <div class="mt-3 d-flex flex-column flex-sm-row gap-2">
        <a href="/accounts/login/" class="btn btn-soft w-100">J'ai déjà un compte</a>
        <a href="/" class="btn btn-soft w-100">Retour accueil</a>
    </div>

    <p id="formError" class="text-danger mt-3 mb-0" style="display:none;"></p>
</div>

<script>
const userInfoSection = document.getElementById("userInfoSection");
const salonInfoSection = document.getElementById("salonInfoSection");
const nextBtn = document.getElementById("nextBtn");

nextBtn.addEventListener("click", () => {
    // Tu peux ajouter ici une validation rapide avant de passer à la partie salon
    const firstName = document.getElementById("first_name").value.trim();
    const lastName = document.getElementById("last_name").value.trim();
    const username = document.getElementById("username").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const passwordConfirm = document.getElementById("password_confirm").value;

    if (!firstName || !lastName || !username || !email || !password || !passwordConfirm) {
        alert("Veuillez remplir tous les champs.");
        return;
    }
    if (password !== passwordConfirm) {
        alert("Les mots de passe ne correspondent pas.");
        return;
    }

    // Passer à la section salon
    userInfoSection.style.display = "none";
    salonInfoSection.style.display = "block";
});

document.getElementById("registerSalonForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const payload = {
        username: document.getElementById("username").value.trim(),
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value,
        password_confirm: document.getElementById("password_confirm").value,
        first_name: document.getElementById("first_name").value.trim(),
        last_name: document.getElementById("last_name").value.trim(),
        salon_nom: document.getElementById("salon_nom").value.trim(),
        salon_adresse: document.getElementById("salon_adresse").value.trim(),
        salon_telephone: document.getElementById("salon_telephone").value.trim(),
        salon_email: document.getElementById("salon_email").value.trim(),
        salon_localisation: document.getElementById("salon_localisation").value.trim(),
        max_postes: Number(document.getElementById("max_postes").value || 1)
    };

    const formError = document.getElementById("formError");
    formError.style.display = "none";

    try {
        const res = await fetch("{% url 'accounts:api:register_salon' %}", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const data = await res.json();
        if (!res.ok) {
            const firstError = Object.values(data)[0];
            const message = Array.isArray(firstError) ? firstError[0] : "Erreur lors de l'inscription.";
            throw new Error(message);
        }

        localStorage.setItem("access_token", data.access);
        localStorage.setItem("refresh_token", data.refresh);
        const canUseApp = data?.salon?.status === "approved" && data?.salon?.paiement_effectue === true;
        localStorage.setItem("salon_can_use_app", canUseApp ? "true" : "false");
        localStorage.setItem(
            "salon_block_message",
            "Votre salon n'est pas encore validé par les administrateurs. Merci de patienter ou d'appeler BarbrePro au +223 78746643."
        );
        window.location.href = "/dashboard/";
    } catch (err) {
        formError.textContent = err.message;
        formError.style.display = "block";
    }
});
</script>
{% endblock content %}
