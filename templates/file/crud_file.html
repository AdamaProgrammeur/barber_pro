{% extends "layout/base.html" %}

{% block content %}
<h2 class="mb-3">File d'Attente</h2>

<!-- Choix du client -->
<div class="mb-3">
    <label for="clientSelect" class="form-label">Choisir un client :</label>
    <select id="clientSelect" class="form-select">
        <option value="">-- Sélectionner un client --</option>
    </select>
</div>

<!-- Liste des services -->
<div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-3" id="servicesContainer"></div>

<hr>

<h3 class="mt-4">File d'Attente</h3>
<div class="table-responsive">
    <table class="table table-striped table-bordered" id="fileTable">
        <thead class="table-dark">
            <tr>
                <th>Nom Client</th>
                <th>Service</th>
                <th>Statut</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<!-- Modal Modifier File -->
<div class="modal fade" id="editFileModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <form id="editFileForm">
                <div class="modal-header">
                    <h5 class="modal-title">Modifier File</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label>Client :</label>
                    <select id="editClient" class="form-select mb-3" required></select>

                    <label>Service :</label>
                    <select id="editService" class="form-select mb-3" required></select>

                    <input type="hidden" id="editFileId">
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-warning w-100">Modifier</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Conteneur pour les messages -->
<div id="alertContainer" class="mt-3 position-fixed top-0 end-0 p-3" style="z-index: 1055;"></div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const token = localStorage.getItem("access_token");
    if (!token) return showAlert("Token manquant !", "danger");

    let clientsList = [];
    let servicesList = [];
    let fileList = [];

    // 🔹 Fonction alerte Bootstrap
    function showAlert(message, type="danger", timeout=4000) {
        const container = document.getElementById("alertContainer");
        const alertDiv = document.createElement("div");
        alertDiv.className = `alert alert-${type} alert-dismissible fade show`;
        alertDiv.role = "alert";
        alertDiv.innerHTML = `
            ${message}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        `;
        container.appendChild(alertDiv);
        if(timeout > 0) setTimeout(() => alertDiv.remove(), timeout);
    }

    // ------------------------------
    // Charger clients
    // ------------------------------
    function loadClients() {
        fetch("/api/clients/", { headers: { "Authorization": "Bearer " + token } })
        .then(res => res.json())
        .then(data => {
            clientsList = data;

            // Utilisation de DocumentFragment pour éviter les reflows
            const select = document.getElementById("clientSelect");
            const editSelect = document.getElementById("editClient");
            const fragSelect = document.createDocumentFragment();
            const fragEdit = document.createDocumentFragment();

            select.innerHTML = '<option value="">-- Sélectionner un client --</option>';
            editSelect.innerHTML = '';

            data.forEach(client => {
                const opt1 = document.createElement("option");
                opt1.value = client.id;
                opt1.textContent = `${client.nom} ${client.prenom}`;
                fragSelect.appendChild(opt1);

                const opt2 = document.createElement("option");
                opt2.value = client.id;
                opt2.textContent = `${client.nom} ${client.prenom}`;
                fragEdit.appendChild(opt2);
            });

            select.appendChild(fragSelect);
            editSelect.appendChild(fragEdit);
        })
        .catch(err => showAlert("Erreur chargement clients : " + JSON.stringify(err), "danger"));
    }

    // ------------------------------
    // Charger services
    // ------------------------------
    function loadServices() {
        fetch("/api/services/", { headers: { "Authorization": "Bearer " + token } })
        .then(res => res.json())
        .then(data => {
            servicesList = data;

            const editSelect = document.getElementById("editService");
            const fragEdit = document.createDocumentFragment();
            editSelect.innerHTML = '';

            data.forEach(service => {
                const opt = document.createElement("option");
                opt.value = service.id;
                opt.textContent = `${service.nom} (${service.prix} FCFA)`;
                fragEdit.appendChild(opt);
            });
            editSelect.appendChild(fragEdit);
        })
        .catch(err => showAlert("Erreur chargement services : " + JSON.stringify(err), "danger"));
    }

    // ------------------------------
    // Afficher services selon client
    // ------------------------------
    function renderServices(clientId) {
        const container = document.getElementById("servicesContainer");
        container.innerHTML = "";
        if (!clientId) return;

        servicesList.forEach(service => {
            const card = document.createElement("div");
            card.className = "col";
            card.innerHTML = `
                <div class="card h-100 shadow-sm">
                    ${service.image ? `<img src="${service.image}" class="card-img-top" style="height:150px; object-fit:cover;">` : ''}
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">${service.nom}</h5>
                        <p class="card-text">${service.prix} FCFA</p>
                        <button class="btn btn-success mt-auto w-100" onclick="addToFile(${clientId}, ${service.id})">
                            Ajouter
                        </button>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // ------------------------------
    // Charger file
    // ------------------------------
    function loadFile() {
        fetch('/api/file_attente/', { headers: { "Authorization": "Bearer " + token } })
        .then(res => res.json())
        .then(data => {
            fileList = data;
            renderFile();
        })
        .catch(err => showAlert("Erreur chargement file : " + JSON.stringify(err), "danger"));
    }

    // ------------------------------
    // Ajouter client à la file
    // ------------------------------
    window.addToFile = function(clientId, serviceId) {
        if(!clientId || !serviceId) return showAlert("Client et service requis !", "warning");
        if(fileList.some(f => f.client == clientId && f.statut != 'TERMINE'))
            return showAlert("Ce client est déjà dans la file d'attente !", "warning");

        fetch('/api/file_attente/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ client: clientId, service: serviceId })
        })
        .then(res => {
            if(!res.ok) return res.json().then(err => { throw err; });
            return res.json();
        })
        .then(data => {
            fileList.push(data);
            renderFile();
            showAlert("Client ajouté à la file avec succès !", "success");
        })
        .catch(err => {
            const msg = err.client || err.detail || JSON.stringify(err);
            showAlert("Erreur ajout file : " + msg, "danger");
        });
    }

    // ------------------------------
    // Afficher file
    // ------------------------------
    function renderFile() {
        const tbody = document.querySelector("#fileTable tbody");
        tbody.innerHTML = "";
        fileList.forEach(item => {
            tbody.innerHTML += `
                <tr>
                    <td>${item.client_name || ''} ${item.client_prenom || ''}</td>
                    <td>${item.service_name || ''}</td>
                    <td>${item.statut || ''}</td>
                    <td>
                        <button class="btn btn-sm btn-warning mb-1 me-1 w-50" onclick="openEditFile(${item.id})">✏️</button>
                        <button class="btn btn-sm btn-danger mb-1 w-50" onclick="deleteFile(${item.id})">🗑</button>
                    </td>
                </tr>
            `;
        });
    }

    // ------------------------------
    // Modifier file
    // ------------------------------
    window.openEditFile = function(id) {
        const item = fileList.find(f => f.id === id);
        if (!item) return;
        document.getElementById("editFileId").value = item.id;
        document.getElementById("editClient").value = item.client || '';
        document.getElementById("editService").value = item.service || '';
        new bootstrap.Modal(document.getElementById("editFileModal")).show();
    }

    document.getElementById("editFileForm").addEventListener("submit", function(e) {
        e.preventDefault();
        const id = parseInt(document.getElementById("editFileId").value);
        const client = parseInt(document.getElementById("editClient").value);
        const service = parseInt(document.getElementById("editService").value);

        if(fileList.some(f => f.client == client && f.statut != 'TERMINE' && f.id != id))
            return showAlert("Ce client est déjà dans la file d'attente !", "warning");

        fetch(`/api/file_attente/${id}/`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ client, service })
        })
        .then(res => { if(!res.ok) return res.json().then(err => { throw err; }); return res.json(); })
        .then(data => {
            const index = fileList.findIndex(f => f.id === id);
            fileList[index] = data;
            renderFile();
            bootstrap.Modal.getInstance(document.getElementById("editFileModal")).hide();
            showAlert("File modifiée avec succès !", "success");
        })
        .catch(err => {
            const msg = err.client || err.detail || JSON.stringify(err);
            showAlert("Erreur modification : " + msg, "danger");
        });
    });

    // ------------------------------
    // Supprimer file
    // ------------------------------
    window.deleteFile = function(id) {
        if(!confirm("Supprimer cet élément de la file ?")) return;
        fetch(`/api/file_attente/${id}/`, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } })
        .then(res => {
            if(res.ok){
                fileList = fileList.filter(f => f.id !== id);
                renderFile();
                showAlert("Élément supprimé avec succès !", "success");
            }
        })
        .catch(err => showAlert("Erreur suppression : " + JSON.stringify(err), "danger"));
    }

    // ------------------------------
    // Filtrer services par client
    // ------------------------------
    document.getElementById("clientSelect").addEventListener("change", function() {
        renderServices(this.value);
    });

    // ------------------------------
    // Initial load
    // ------------------------------
    loadClients();
    loadServices();
    loadFile();
});
</script>
{% endblock %}
