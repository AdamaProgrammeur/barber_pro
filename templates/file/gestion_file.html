{% extends "layout/base.html" %}

{% block content %}
<h1 class="mb-4">Gestion des Files d'Attente</h1>

<!-- Résumé Dashboard Dynamique -->
<div class="row mb-4">
    <div class="col-md-3">
        <div class="card bg-success text-white shadow-sm">
            <div class="card-body py-2">
                <small>CA Aujourd'hui</small>
                <h4 id="stat-ca-today" class="mb-0">0 FCFA</h4>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card bg-info text-white shadow-sm">
            <div class="card-body py-2">
                <small>Bénéfice Net Aujourd'hui</small>
                <h4 id="stat-benefice-today" class="mb-0">0 FCFA</h4>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card bg-warning text-dark shadow-sm">
            <div class="card-body py-2">
                <small>Restes à Payer</small>
                <h4 id="stat-reste-today" class="mb-0">0 FCFA</h4>
            </div>
        </div>
    </div>
</div>

<div id="alert-container"></div>

<!-- Bouton vers gestion paiements -->
<a class="btn btn-primary mb-3" href="{% url 'crud_paiement_page' %}">
    <i class="fa fa-plus"></i> Gérer les non payés
</a>

<div class="table-responsive">
    <table class="table table-hover table-bordered text-center align-middle" id="fileTable">
        <thead class="table-light">
            <tr>
                <th>Client</th>
                <th>Service</th>
                <th>Prix</th>
                <th>Statut</th>
                <th>Heure</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<!-- Modal paiement -->
<div class="modal fade" id="paiementModal" tabindex="-1" aria-labelledby="paiementModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="paiementModalLabel">Paiement client</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="paiement-modal-form">
          <div class="mb-3">
            <label class="form-label">Client</label>
            <input type="text" class="form-control" id="modal-client" readonly>
          </div>
          <div class="mb-3">
            <label class="form-label">Montant</label>
            <input type="number" class="form-control" id="modal-montant" readonly>
          </div>
          <div class="mb-3">
            <label class="form-label">Mode de paiement</label>
            <select class="form-select" id="modal-mode" required>
              <option value="CASH">Espèce</option>
              <option value="ORANGE_MONEY">Orange Money</option>
              <option value="MOOV">Moov Africa</option>
            </select>
          </div>
          <input type="hidden" id="modal-file-id">
          <button type="submit" class="btn btn-success w-100">Valider</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const token = localStorage.getItem("access_token");
    if (!token) return alert("Token manquant !");

    const tableBody = document.querySelector("#fileTable tbody");
    const paiementModal = new bootstrap.Modal(document.getElementById("paiementModal"));
    let fileList = [];

    function showAlert(message, type="danger", html=false) {
        const container = document.getElementById("alert-container");
        if (!container) return;
        if (html) container.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show" role="alert">${message}</div>`;
        else container.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show" role="alert">${message}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>`;
    }

    // 🔹 Mettre à jour les stats en haut
    function updateDashboardStats() {
        fetch('/api/dashboard/', { headers: { "Authorization": "Bearer " + token } })
        .then(res => res.json())
        .then(data => {
            document.getElementById("stat-ca-today").innerText = `${Math.round(data.paiements.total_amount_today)} FCFA`;
            document.getElementById("stat-reste-today").innerText = `${Math.round(data.paiements.reste_a_payer_today)} FCFA`;
            document.getElementById("stat-benefice-today").innerText = `${Math.round(data.benefice_net_today)} FCFA`;
        })
        .catch(err => console.error("Erreur stats dashboard", err));
    }

    // 🔹 Charger files
    function loadFile() {
        fetch('/api/file_attente/', { headers: { "Authorization": "Bearer " + token } })
        .then(res => res.json())
        .then(data => {
            fileList = data;
            renderFile();
            updateDashboardStats();
        })
        .catch(err => showAlert("Erreur chargement file : " + JSON.stringify(err), "danger"));
    }

    function renderFile() {
        tableBody.innerHTML = "";
        fileList
        .filter(file => file.statut === "EN_ATTENTE" || file.statut === "EN_COURS")
        .forEach(file => {
            const paiementInfo = file.paiement_info || null;
            const paid = !!paiementInfo && (paiementInfo.statut === "VALIDE" || Number(paiementInfo.reste) <= 0);
            const reste = paiementInfo ? paiementInfo.reste : file.service_prix;
            const montantPaye = paiementInfo ? paiementInfo.montant_paye : 0;

            const row = document.createElement("tr");
            row.dataset.id = file.id;
            row.dataset.paid = paid ? "true" : "false";
            row.dataset.servicePrice = file.service_prix;
            row.dataset.reste = reste;
            row.dataset.montantPaye = montantPaye;

            row.innerHTML = `
                <td>${file.client_name} ${file.client_prenom}</td>
                <td>${file.service_name}</td>
                <td>${file.service_prix || 0}</td>
                <td class="statut">
                    ${file.statut === "EN_ATTENTE" ? '<span class="badge bg-warning text-dark">En attente</span>' :
                      file.statut === "EN_COURS" ? '<span class="badge bg-primary">En cours</span>' :
                      '<span class="badge bg-success">Terminé</span>'}
                </td>
                <td>${file.heure || ''}</td>
                <td class="actions">
                    <button class="btn btn-sm btn-success start-btn">Commencer</button>
                    <button class="btn btn-sm btn-primary pay-btn">Payer</button>
                    <button class="btn btn-sm btn-warning finish-btn">Terminer</button>
                    <span class="badge bg-success paid-badge" style="display: none;">Paiement enregistré</span>
                </td>
            `;
            tableBody.appendChild(row);
            refreshButtons(row, file.statut, paid);
        });
        attachEvents();
    }

    function refreshButtons(row, statut, paid) {
        const startBtn = row.querySelector(".start-btn");
        const payBtn = row.querySelector(".pay-btn");
        const finishBtn = row.querySelector(".finish-btn");
        const paidBadge = row.querySelector(".paid-badge");

        startBtn.style.display = "none";
        payBtn.style.display = "none";
        finishBtn.style.display = "none";
        paidBadge.style.display = paid ? "inline-block" : "none";

        if (statut === "EN_ATTENTE") {
            startBtn.style.display = "inline-block";
            if (!paid) payBtn.style.display = "inline-block";
        } else if (statut === "EN_COURS") {
            finishBtn.style.display = "inline-block";
            if (!paid) payBtn.style.display = "inline-block";
        }
    }

    function attachEvents() {
        tableBody.querySelectorAll(".start-btn").forEach(btn => btn.onclick = () => startFile(btn));
        tableBody.querySelectorAll(".finish-btn").forEach(btn => btn.onclick = () => finishFile(btn));
        tableBody.querySelectorAll(".pay-btn").forEach(btn => btn.onclick = () => openPaiementModal(btn));
    }

    function startFile(btn) {
        const row = btn.closest("tr");
        const id = row.dataset.id;
        fetch(`/api/file_attente/${id}/commencer/`, {
            method: "POST",
            headers: { "Authorization": "Bearer " + token }
        })
        .then(res => res.json())
        .then(data => {
            const paiementInfo = data.paiement_info || null;
            const isPaid = !!paiementInfo && (paiementInfo.statut === "VALIDE" || Number(paiementInfo.reste) <= 0);
            row.dataset.paid = isPaid ? "true" : "false";
            updateRowStatus(row, "EN_COURS");
        })
        .catch(err => showAlert("Erreur démarrage file", "danger"));
    }

    function finishFile(btn) {
        const row = btn.closest("tr");
        const paid = row.dataset.paid === "true";
        const id = row.dataset.id;

        if (!paid) {
            // ⚠️ Eviter alerte répétée
            if (document.getElementById("pay-now")) return;

            showAlert(`
                Client non payé.
                <button id="pay-now" class="btn btn-sm btn-primary">Payer maintenant</button>
                <button id="pay-later" class="btn btn-sm btn-warning">Plus tard</button>
            `, "warning", true);

            document.getElementById("pay-now").onclick = () => openPaiementModal(row.querySelector(".pay-btn"));

            document.getElementById("pay-later").onclick = () => {
                fetch("/api/paiements/", {
                    method: "POST",
                    headers: { 
                        "Authorization": "Bearer " + token,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        file_attente: id,
                        montant: 0,
                        mode_paiement: "CASH"
                    })
                })
                .then(res => {
                    if (!res.ok) throw new Error("Impossible de marquer ce client en non payé.");
                    return res.json();
                })
                .then(() => {
                    return fetch(`/api/file_attente/${id}/terminer/`, {
                        method: "POST",
                        headers: { "Authorization": "Bearer " + token }
                    });
                })
                .then(res => {
                    if (!res.ok) throw new Error("Impossible de terminer la prestation.");
                    row.remove(); // retire de la liste active
                    showAlert("Client enregistré comme non payé", "info");
                })
                .catch(err => showAlert(err.message || "Erreur Plus tard", "danger"));
            };
            return;
        }

        fetch(`/api/file_attente/${id}/terminer/`, {
            method: "POST",
            headers: { "Authorization": "Bearer " + token }
        })
        .then(() => row.remove())
        .catch(err => showAlert("Erreur terminer file", "danger"));
    }

    function openPaiementModal(btn) {
        const row = btn.closest("tr");
        document.getElementById("modal-client").value = row.children[0].innerText; 
        document.getElementById("modal-montant").value = row.dataset.reste || row.dataset.servicePrice || 0;
        document.getElementById("modal-file-id").value = row.dataset.id;
        paiementModal.show();
    }

    document.getElementById("paiement-modal-form").addEventListener("submit", function(e) {
        e.preventDefault();
        const fileId = document.getElementById("modal-file-id").value;
        const montant = document.getElementById("modal-montant").value;
        const mode = document.getElementById("modal-mode").value;
        const row = tableBody.querySelector(`tr[data-id='${fileId}']`);

        fetch("/api/paiements/", {
            method: "POST",
            headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
            body: JSON.stringify({ file_attente: fileId, montant, mode_paiement: mode })
        })
        .then(res => {
            if (!res.ok) {
                return res.json().then(data => {
                    throw new Error(data.error || "Erreur de paiement.");
                });
            }
            return res.json();
        })
        .then((data) => {
            showAlert(`Paiement enregistré. Montant payé : ${data.paiement_info.montant_paye}, reste : ${data.paiement_info.reste}`, "success");
            // data est maintenant l'objet FileAttente mis à jour (grâce au changement dans views.py)
            const pInfo = data.paiement_info || {};
            const isPaid = pInfo.statut === "VALIDE" || Number(pInfo.reste) <= 0;
            
            row.dataset.paid = isPaid ? "true" : "false";
            row.dataset.reste = pInfo.reste || row.dataset.servicePrice;
            row.dataset.montantPaye = pInfo.montant_paye || 0;

            updateRowStatus(row, data.statut);
            paiementModal.hide();
            updateDashboardStats(); // 🔄 Mise à jour immédiate du dashboard !
        })
        .catch(err => showAlert(err.message || "Erreur paiement", "danger"));
    });

    function updateRowStatus(row, statut) {
        row.querySelector(".statut").innerHTML =
            statut === "EN_COURS" ? '<span class="badge bg-primary">En cours</span>' :
            statut === "EN_ATTENTE" ? '<span class="badge bg-warning text-dark">En attente</span>' :
            '<span class="badge bg-success">Terminé</span>';
        refreshButtons(row, statut, row.dataset.paid === "true");
    }

    loadFile();
});
</script>
{% endblock %}
